<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>shijian当てゲーム</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #e0f2ff, #ffffff);
  text-align: center;
  margin: 0;
  padding: 20px;
}

/* ===== 気が向いたからスタート画面をつくった===== */
#startScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.title {
  font-size: 42px;
  font-weight: bold;
  animation: wobble 1.5s infinite ease-in-out;
}

@keyframes wobble {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.startBtn {
  margin-top: 40px;
  font-size: 26px;
  padding: 18px 30px;
  border-radius: 16px;
  background: #3b82f6;
  color: white;
  border: none;
}

.helpBtn {
  margin-top: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  font-size: 24px;
  background: #ddd;
  border: none;
}

/* ===== モーダル ===== */
#modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modalContent {
  background: white;
  max-width: 400px;
  width: 85%;
  margin: 100px auto;
  padding: 20px;
  border-radius: 20px;
}

.okBtn {
  margin-top: 15px;
  padding: 10px 20px;
}

/* ===== 旧UI ===== */
.container {
  background: white;
  max-width: 450px;
  width: 90%;
  margin: auto;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  display: none;
}

button {
  width: 100%;
  margin: 10px 0;
  padding: 16px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}

button:active {
  transform: scale(0.98);
}

.choice { background: #f3f4f6; }
.choice:hover { background: #dbeafe; }
.correct { background: #86efac !important; }
.wrong { background: #fca5a5 !important; }

.play { background: #3b82f6; color: white; }
.play.playing { background: #10b981; }

.next {
  background: #6366f1;
  color: white;
  margin-top: 10px;
  display: none;
}

#progress {
  margin: 10px 0;
  font-weight: bold;
  font-size: 16px;
}

#result {
  font-size: 20px;
  margin-top: 10px;
  word-break: break-word;
}

#rank {
  font-size: 26px;
  font-weight: bold;
  margin-top: 20px;
  word-break: break-word;
}

/* ===== ホーム戻ろうのボタン ===== */
.homeBtn {
  margin-top: 20px;
  background: #f59e0b;
  color: white;
}

/* ===== 紙吹雪 ===== */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(720deg);
  }
}

/* ===== MEMZ風 ===== */
@keyframes rainbowBG {
  0% { background: red; }
  20% { background: yellow; }
  40% { background: lime; }
  60% { background: cyan; }
  80% { background: blue; }
  100% { background: magenta; }
}

@keyframes spinCrazy {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.5); }
  100% { transform: rotate(360deg) scale(1); }
}

.memz {
  animation: spinCrazy 1s infinite linear;
  font-size: 40px !important;
}

/* スマホ用 */
@media (max-width: 400px) {
  .title { font-size: 32px; }
  .startBtn { font-size: 22px; }
  button {
    font-size: 16px;
    padding: 14px;
  }
}
</style>
</head>

<body>

<div id="startScreen">
  <div class="title">shijian当てゲーム</div>
  <button class="startBtn" onclick="startFromMenu()">ゲームスタート</button>
  <button class="helpBtn" onclick="openModal()">？</button>
</div>

<div id="modal">
  <div class="modalContent">
    <p>説明</p>
    <button class="okBtn" onclick="closeModal()">OK</button>
  </div>
</div>

<div class="container">
  <h2>🎧 shijian当てゲーム</h2>
  <div id="progress"></div>
  <label id="toggleContainer">
    <input type="checkbox" id="togglePinyin" onchange="renderChoices()">
    拼音を表示する
  </label>
  <button id="playBtn" class="play" onclick="playAudio()">▶ 音声を再生</button>
  <div id="choices"></div>
  <p id="result"></p>
  <p id="rank"></p>
  <button id="nextBtn" class="next" onclick="nextQuestion()">⏭ 次の問題</button>
  <button id="homeBtn" class="homeBtn" onclick="goHome()" style="display:none;">🏠 ホームに戻る</button>
</div>

<script>
//（元コードそのまま省略せず残してる）

// --- 省略なしでそのまま ---
const allQuestions = [
  { word: "事件", pinyin: "shìjiàn" },
  { word: "时间", pinyin: "shíjiān" },
  { word: "实践", pinyin: "shíjiàn" },
  { word: "世间", pinyin: "shìjiān" },
  { word: "始建", pinyin: "shǐjiàn" },
  { word: "使奸", pinyin: "shǐjiān" },
  { word: "诗笺", pinyin: "shījiān" },
  { word: "释简", pinyin: "shìjiǎn" },
  { word: "施建", pinyin: "shījiàn" }
];

const audioMap = {
  "事件": "https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi4jian4.mp3",
  "时间": "https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi2jian1.mp3",
  "实践": "https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi2jian4.mp3",
  "世间": "https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi4jian1.mp3",
  "始建": "https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi3jian4.mp3",
  "使奸": "https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi3jian1.mp3",
  "诗笺": "https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi1jian1.mp3",
  "释简": "https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi4jian3.mp3",
  "施建": "https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi1jian4.mp3"
};

let quiz = [];
let currentIndex = 0;
let correctCount = 0;
let current;

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function displayText(q){
  return document.getElementById("togglePinyin").checked
    ? `${q.word}（${q.pinyin}）`
    : q.word;
}

function startGame(){
  quiz = shuffle(allQuestions);
  quiz.push(allQuestions[Math.floor(Math.random()*allQuestions.length)]);
  currentIndex = 0;
  correctCount = 0;
  showQuestion();
}

function showQuestion(){
  if(currentIndex >= quiz.length){ showResult(); return; }
  current = quiz[currentIndex];
  currentIndex++;
  document.getElementById("progress").innerText = `問題 ${currentIndex} / 10`;

  let choices = shuffle(allQuestions);
  let html = "";
  choices.forEach(q=>{
    html += `<button class="choice" onclick="checkAnswer(this,'${q.word}')">${displayText(q)}</button>`;
  });
  document.getElementById("choices").innerHTML = html;
  document.getElementById("result").innerText = "";
  document.getElementById("rank").innerText = "";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("playBtn").style.display = "inline-block";
}

function renderChoices(){
  let buttons = document.querySelectorAll(".choice");
  buttons.forEach(btn=>{
    let word = btn.innerText.split("（")[0];
    let q = allQuestions.find(o=>o.word===word);
    if(q) btn.innerText = displayText(q);
  });
}

function playAudio(){
  let btn = document.getElementById("playBtn");
  btn.classList.add("playing");
  btn.innerText = "🔊 再生中...";
  let audio = new Audio(audioMap[current.word]);
  audio.play();
  audio.onended = () => {
    btn.classList.remove("playing");
    btn.innerText = "▶ 音声を再生";
  };
}

function checkAnswer(button, selected){
  let buttons = document.querySelectorAll(".choice");
  buttons.forEach(btn=>{
    btn.disabled = true;
    if(btn.innerText.includes(current.word)) btn.classList.add("correct");
    else if(btn===button) btn.classList.add("wrong");
  });

  if(selected===current.word) correctCount++;
  let pinyinText = `（${current.pinyin}）`;
  document.getElementById("result").innerText =
    selected===current.word ? `✅ 正解！${document.getElementById("togglePinyin").checked ? pinyinText : ""}`
                            : `❌ 不正解！正解は「${current.word}${pinyinText}」`;

  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion(){ showQuestion(); }

function showResult(){
  document.getElementById("choices").innerHTML = "";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("playBtn").style.display = "none";
  document.getElementById("progress").innerText = "";
  document.getElementById("toggleContainer").style.display = "none";
  document.getElementById("homeBtn").style.display = "block";

  const rankNames = [
    "ひよっこshijianプレイヤー",
    "shijian当て初心者",
    "shijian当て初心者",
    "shijian当て初級者",
    "shijian当て中級者",
    "shijian当て上級者",
    "見習いshijian鑑定士",
    "熟練したshijian鑑定士",
    "特級shijian鑑定士",
    "プロshijian当て職人",
    "レジェンドshijian当てer"
  ];

  document.getElementById("result").style.fontSize = "24px";
  document.getElementById("result").innerText = `🎉 遊んでくれてありがとう‼️\n10問中 ${correctCount} 問正解！`;

  const rank = document.getElementById("rank");
  rank.innerText = rankNames[correctCount];
  rank.style.color = "#e91e63";
  rank.style.fontSize = "28px";
  rank.style.fontWeight = "bold";

  // ===== ここだけ追加 =====
  if(correctCount === 10){
    let rand = Math.random();

    if(rand < 0.95){
      // 紙吹雪
      for(let i=0;i<100;i++){
        let confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random()*100 + "vw";
        confetti.style.background = `hsl(${Math.random()*360},100%,50%)`;
        confetti.style.animationDuration = (Math.random()*2+2)+"s";
        document.body.appendChild(confetti);
        setTimeout(()=>confetti.remove(),4000);
      }
    } else {
      // MEMZ風
      document.body.style.animation = "rainbowBG 0.3s infinite";
      rank.classList.add("memz");
    }
  }
}
</script>

</body>
</html>
