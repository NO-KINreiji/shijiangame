<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>shijian当てゲーム</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #e0f2ff, #ffffff);
  text-align: center;
  margin: 0;
  padding: 20px;
}

#startScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.title {
  font-size: 42px;
  font-weight: bold;
  animation: wobble 1.5s infinite ease-in-out;
}

@keyframes wobble {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.startBtn {
  margin-top: 40px;
  font-size: 26px;
  padding: 18px 30px;
  border-radius: 16px;
  background: #3b82f6;
  color: white;
  border: none;
}

.helpBtn {
  margin-top: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  font-size: 24px;
  background: #ddd;
  border: none;
}

/* モーダル */
#modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modalContent {
  background: white;
  max-width: 400px;
  width: 85%;
  margin: 100px auto;
  padding: 20px;
  border-radius: 20px;
}

.okBtn {
  margin-top: 15px;
  padding: 10px 20px;
}

.container {
  background: white;
  max-width: 450px;
  width: 90%;
  margin: auto;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  display: none;
}

button {
  width: 100%;
  margin: 10px 0;
  padding: 16px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

.choice { background: #f3f4f6; }
.correct { background: #86efac !important; }
.wrong { background: #fca5a5 !important; }

.play { background: #3b82f6; color: white; }
.next { background: #6366f1; color: white; display:none; }

#progress { font-weight:bold; }

.homeBtn { background:#f59e0b; color:white; }

/* 紙吹雪 */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to { transform: translateY(110vh) rotate(720deg); }
}

/* MEMZ */
@keyframes rainbowBG {
  0%{background:red;}
  20%{background:yellow;}
  40%{background:lime;}
  60%{background:cyan;}
  80%{background:blue;}
  100%{background:magenta;}
}

@keyframes spinCrazy {
  0%{transform:rotate(0) scale(1);}
  50%{transform:rotate(180deg) scale(1.5);}
  100%{transform:rotate(360deg) scale(1);}
}

.memz {
  animation: spinCrazy 1s infinite linear;
  font-size: 40px !important;
}
</style>
</head>

<body>

<div id="startScreen">
  <div class="title">shijian当てゲーム</div>
  <button class="startBtn" onclick="startFromMenu()">ゲームスタート</button>
  <button class="helpBtn" onclick="openModal()">？</button>
</div>

<div id="modal">
  <div class="modalContent">
    <p>説明</p>
    <button class="okBtn" onclick="closeModal()">OK</button>
  </div>
</div>

<div class="container">
  <h2>🎧 shijian当てゲーム</h2>
  <div id="progress"></div>
  <button id="playBtn" class="play" onclick="playAudio()">▶ 音声</button>
  <div id="choices"></div>
  <p id="result"></p>
  <p id="rank"></p>
  <button id="nextBtn" class="next" onclick="nextQuestion()">次</button>
  <button id="homeBtn" class="homeBtn" onclick="goHome()" style="display:none;">ホーム</button>
</div>

<script>

// ===== ここが抜けてた（原因）=====
function startFromMenu(){
  document.getElementById("startScreen").style.display = "none";
  document.querySelector(".container").style.display = "block";
  startGame();
}

function openModal(){
  document.getElementById("modal").style.display = "block";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function goHome(){
  location.reload();
}

// ===== ゲーム =====
const allQuestions = [
  { word:"事件", pinyin:"shìjiàn"},
  { word:"时间", pinyin:"shíjiān"},
  { word:"实践", pinyin:"shíjiàn"},
  { word:"世间", pinyin:"shìjiān"},
  { word:"始建", pinyin:"shǐjiàn"},
  { word:"使奸", pinyin:"shǐjiān"},
  { word:"诗笺", pinyin:"shījiān"},
  { word:"释简", pinyin:"shìjiǎn"},
  { word:"施建", pinyin:"shījiàn"}
];

const audioMap = {
  "事件":"https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi4jian4.mp3",
  "时间":"https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi2jian1.mp3",
  "实践":"https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi2jian4.mp3",
  "世间":"https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi4jian1.mp3",
  "始建":"https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi3jian4.mp3",
  "使奸":"https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi3jian1.mp3",
  "诗笺":"https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi1jian1.mp3",
  "释简":"https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi4jian3.mp3",
  "施建":"https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi1jian4.mp3"
};

let quiz=[],currentIndex=0,correctCount=0,current;

function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}

function startGame(){
  quiz = shuffle(allQuestions);
  quiz.push(allQuestions[Math.floor(Math.random()*allQuestions.length)]);
  currentIndex=0;correctCount=0;
  showQuestion();
}

function showQuestion(){
  if(currentIndex>=quiz.length){showResult();return;}
  current=quiz[currentIndex++];
  document.getElementById("progress").innerText=`${currentIndex}/10`;

  let html="";
  shuffle(allQuestions).forEach(q=>{
    html+=`<button class="choice" onclick="checkAnswer(this,'${q.word}')">${q.word}</button>`;
  });
  document.getElementById("choices").innerHTML=html;
  document.getElementById("result").innerText="";
  document.getElementById("nextBtn").style.display="none";
}

function playAudio(){
  new Audio(audioMap[current.word]).play();
}

function checkAnswer(btn,sel){
  document.querySelectorAll(".choice").forEach(b=>{
    b.disabled=true;
    if(b.innerText===current.word) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
  });

  if(sel===current.word) correctCount++;
  document.getElementById("nextBtn").style.display="block";
}

function nextQuestion(){showQuestion();}

function showResult(){
  document.getElementById("choices").innerHTML="";
  document.getElementById("homeBtn").style.display="block";

  document.getElementById("result").innerText=`10問中 ${correctCount}問正解`;

  const rank=document.getElementById("rank");
  rank.innerText="レジェンドshijian当てer";

  // ★演出
  if(correctCount===10){
    let r=Math.random();

    if(r<0.95){
      for(let i=0;i<100;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),4000);
      }
    }else{
      document.body.style.animation="rainbowBG 0.3s infinite";
      rank.classList.add("memz");
    }
  }
}
</script>

</body>
</html>
