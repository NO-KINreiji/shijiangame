<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>shijian当てゲーム</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #e0f2ff, #ffffff);
  text-align: center;
  margin: 0;
  padding: 20px;
}

/* ===== スタート画面 ===== */
#startScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.title {
  font-size: 42px;
  font-weight: bold;
  animation: wobble 1.5s infinite ease-in-out;
}

@keyframes wobble {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.startBtn {
  margin-top: 40px;
  font-size: 26px;
  padding: 18px 30px;
  border-radius: 16px;
  background: #3b82f6;
  color: white;
  border: none;
}

.helpBtn {
  margin-top: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  font-size: 24px;
  background: #ddd;
  border: none;
}

/* ===== モーダル ===== */
#modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modalContent {
  background: white;
  max-width: 400px;
  width: 85%;
  margin: 100px auto;
  padding: 20px;
  border-radius: 20px;
}

.okBtn {
  margin-top: 15px;
  padding: 10px 20px;
}

/* ===== ゲーム本体 ===== */
.container {
  background: white;
  max-width: 450px;
  width: 90%;
  margin: auto;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  display: none;
}

button {
  width: 100%;
  margin: 10px 0;
  padding: 16px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

.choice { background: #f3f4f6; }
.correct { background: #86efac !important; }
.wrong { background: #fca5a5 !important; }

.play { background: #3b82f6; color: white; }
.next { background: #6366f1; color: white; display: none; }

#progress { font-weight: bold; }

#rank {
  font-size: 26px;
  font-weight: bold;
  margin-top: 20px;
}

.homeBtn {
  margin-top: 20px;
  background: #f59e0b;
  color: white;
}

/* ===== 紙吹雪 ===== */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to { transform: translateY(110vh) rotate(720deg); }
}

/* ===== MEMZ ===== */
@keyframes rainbow {
  0% { background: red; }
  20% { background: yellow; }
  40% { background: lime; }
  60% { background: cyan; }
  80% { background: blue; }
  100% { background: magenta; }
}

.rainbowMode {
  animation: rainbow 0.2s infinite;
}

@keyframes spinCrazy {
  0% { transform: rotate(0deg) scale(1); }
  100% { transform: rotate(1080deg) scale(1.5); }
}

.legendSpin {
  animation: spinCrazy 1s infinite linear;
  font-size: 40px !important;
}
</style>
</head>

<body>

<div id="startScreen">
  <div class="title">shijian当てゲーム</div>
  <button class="startBtn" onclick="startFromMenu()">ゲームスタート</button>
</div>

<div class="container">
  <div id="progress"></div>
  <button id="playBtn" onclick="playAudio()">▶ 音声</button>
  <div id="choices"></div>
  <p id="result"></p>
  <p id="rank"></p>
  <button id="nextBtn" onclick="nextQuestion()">次</button>
  <button id="homeBtn" class="homeBtn" onclick="goHome()" style="display:none;">🏠</button>
</div>

<script>
// ===== データ =====
const allQuestions = [
  { word: "事件", pinyin: "shìjiàn" },
  { word: "时间", pinyin: "shíjiān" }
];

const audioMap = {
  "事件": "https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi4jian4.mp3",
  "时间": "https://raw.githubusercontent.com/NO-KINreiji/shijiangame/refs/heads/main/shi2jian1.mp3"
};

let quiz = [];
let currentIndex = 0;
let correctCount = 0;
let current;

function startFromMenu(){
  document.getElementById("startScreen").style.display = "none";
  document.querySelector(".container").style.display = "block";
  startGame();
}

function goHome(){ location.reload(); }

function startGame(){
  quiz = [...allQuestions];
  currentIndex = 0;
  correctCount = 0;
  showQuestion();
}

function showQuestion(){
  if(currentIndex >= quiz.length){ showResult(); return; }
  current = quiz[currentIndex];
  currentIndex++;

  document.getElementById("progress").innerText = currentIndex;

  let html = "";
  allQuestions.forEach(q=>{
    html += `<button onclick="checkAnswer('${q.word}')">${q.word}</button>`;
  });
  document.getElementById("choices").innerHTML = html;
}

function playAudio(){
  new Audio(audioMap[current.word]).play();
}

function checkAnswer(selected){
  if(selected===current.word) correctCount++;
  showQuestion();
}

function nextQuestion(){ showQuestion(); }

// ===== ⭐ここだけ変更 =====
function showResult(){

  const rank = document.getElementById("rank");

  const rankNames = [
    "ひよっこ",
    "初心者",
    "初心者",
    "初級",
    "中級",
    "上級",
    "見習い",
    "熟練",
    "特級",
    "プロ",
    "レジェンドshijian当てer"
  ];

  document.getElementById("result").innerText =
    `10問中 ${correctCount} 問正解！`;

  rank.innerText = rankNames[correctCount];

  // ===== 10点だけ演出 =====
  if(correctCount === 10){

    if(Math.random() < 0.95){
      // 🎉 紙吹雪
      for(let i=0;i<100;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100+"vw";
        c.style.background = `hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
      }

    } else {
      // 🌈 MEMZ
      document.body.classList.add("rainbowMode");
      rank.classList.add("legendSpin");
    }
  }

  document.getElementById("homeBtn").style.display = "block";
}
</script>

</body>
</html>
